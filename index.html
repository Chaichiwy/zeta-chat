<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZETA Chat</title>
    <style>
        /* --- قسم الـ CSS الكامل والمطور --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        input {
            padding: 14px;
            border: 2px solid transparent;
            outline: none;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #3b82f6;
            background: #1e293b;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* رسائل الخطأ */
        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* رسائل النجاح */
        .success-message {
            color: #16a34a;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* واجهة تسجيل الدخول */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: #1e293b;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .login-card h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            color: #94a3b8;
            font-size: 13px;
        }

        /* واجهة المحادثة */
        .chat-app {
            display: none;
            flex-direction: row;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #1e293b;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid #334155;
        }

        .sidebar h2 {
            font-size: 24px;
            font-weight: 800;
            color: #3b82f6;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        /* صندوق الرسائل المطور */
        #messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* تصميم كرت الرسالة الجديد */
        .message-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            max-width: 80%;
        }

        /* الصورة الرمزية للمستخدم (Avatar) */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #475569;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            text-transform: uppercase;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .message-content {
            background: #1e293b;
            padding: 12px 16px;
            border-radius: 0 16px 16px 16px;
            position: relative;
            max-width: 100%;
            word-wrap: break-word;
        }

        /* لتمييز رسائلك أنت عن الآخرين */
        .message-wrapper.own-message {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 80%;
        }

        .message-wrapper.own-message .message-content {
            background: #2563eb;
            border-radius: 16px 0 16px 16px;
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .msg-username {
            font-weight: 700;
            font-size: 14px;
            color: #60a5fa;
        }
        
        .message-wrapper.own-message .msg-username {
            color: #93c5fd;
        }

        .msg-time {
            font-size: 11px;
            color: #94a3b8;
        }

        .message-wrapper.own-message .msg-time {
            color: #bfdbfe;
        }

        .msg-text {
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
            white-space: pre-wrap;
        }

        /* صندوق الإرسال */
        .send-box {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: #0f172a;
            border-top: 1px solid #1e293b;
        }

        #messageInput {
            flex: 1;
            background: #1e293b;
        }

        #logoutBtn {
            background: #ef4444;
            width: 100%;
        }

        #logoutBtn:hover {
            background: #dc2626;
        }

        .loading {
            display: none;
            color: #60a5fa;
            font-size: 13px;
            margin-top: 10px;
        }

        .loading.show {
            display: block;
        }

        /* 📱 شاشات الهواتف الذكية (Responsive Design) */
        @media (max-width: 768px) {
            .chat-app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                padding: 15px 20px;
                flex-direction: row;
                align-items: center;
                border-right: none;
                border-bottom: 1px solid #334155;
            }
            #logoutBtn {
                width: auto;
                padding: 8px 16px;
            }
            #welcomeUser {
                margin-top: 0 !important;
                display: inline-block;
                margin-left: 10px;
            }
            .message-wrapper {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <div id="loginPage" class="login-container">
        <div class="login-card">
            <h1>ZETA Chat</h1>
            <p>Real Time Chat Application</p>
            <p style="font-size: 11px; color: #64748b; margin-top: -10px;">Powered by Firebase</p>
            
            <div>
                <input type="email" id="email" placeholder="Email Address">
                <div id="emailError" class="error-message"></div>
            </div>

            <div>
                <input type="password" id="password" placeholder="Password (Min 6 characters)">
                <div id="passwordError" class="error-message"></div>
            </div>

            <button id="loginBtn">Login</button>
            <button id="registerBtn" style="background: #334155;">Create Account</button>
            
            <div id="authLoading" class="loading">Authenticating...</div>
        </div>
    </div>

    <div id="chatPage" class="chat-app">
        <aside class="sidebar">
            <div>
                <h2>ZETA</h2>
                <p id="welcomeUser" style="color: #94a3b8; margin-top: 8px; font-size: 14px;"></p>
            </div>
            <button id="logoutBtn">Logout</button>
        </aside>

        <main class="chat-area">
            <div id="messages"></div>
            <div class="send-box">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button id="sendBtn">Send</button>
            </div>
        </main>
    </div>

    <!-- Firebase SDK v9+ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDteU16Z4m8GdCaXe33zwd4NOxsD24QzlQ",
            authDomain: "zeta-chat-25bf7.firebaseapp.com",
            projectId: "zeta-chat-25bf7",
            storageBucket: "zeta-chat-25bf7.firebasestorage.app",
            messagingSenderId: "543897650460",
            appId: "1:543897650460:web:b10703aed077313557a6d9",
            measurementId: "G-Z0GMVB0FDT"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.addEventListener("DOMContentLoaded", () => {
            const loginPage = document.getElementById("loginPage");
            const loginBtn = document.getElementById("loginBtn");
            const registerBtn = document.getElementById("registerBtn");
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            const emailError = document.getElementById("emailError");
            const passwordError = document.getElementById("passwordError");
            const authLoading = document.getElementById("authLoading");

            const chatPage = document.getElementById("chatPage");
            const messageInput = document.getElementById("messageInput");
            const sendBtn = document.getElementById("sendBtn");
            const messagesContainer = document.getElementById("messages");
            const logoutBtn = document.getElementById("logoutBtn");
            const welcomeUser = document.getElementById("welcomeUser");

            let currentUser = null;
            let unsubscribeMessages = null;

            // دالة التحقق من صحة البريد الإلكتروني
            const validateEmail = (email) => {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            };

            // دالة التحقق من صحة كلمة المرور
            const validatePassword = (password) => {
                return password.length >= 6;
            };

            // دالة لتوليد لون خلفية عشوائي وثابت لكل مستخدم
            const getAvatarColor = (email) => {
                let hash = 0;
                for (let i = 0; i < email.length; i++) {
                    hash = email.charCodeAt(i) + ((hash << 5) - hash);
                }
                const colors = ['#2563eb', '#16a34a', '#db2777', '#d97706', '#9333ea', '#ea580c', '#0d9488'];
                return colors[Math.abs(hash) % colors.length];
            };

            const clearErrors = () => {
                emailError.textContent = "";
                emailError.classList.remove("show");
                passwordError.textContent = "";
                passwordError.classList.remove("show");
            };

            const showLoading = (show) => {
                authLoading.classList.toggle("show", show);
            };

            const checkAuthStatus = (user) => {
                if (user) {
                    currentUser = user;
                    loginPage.style.display = "none";
                    chatPage.style.display = "flex";
                    welcomeUser.textContent = `👤 ${user.email.split("@")[0]}`;
                    loadMessages();
                    listenToMessages();
                } else {
                    currentUser = null;
                    loginPage.style.display = "flex";
                    chatPage.style.display = "none";
                    if (unsubscribeMessages) unsubscribeMessages();
                }
            };

            // تسجيل حساب جديد
            const handleRegister = async () => {
                clearErrors();
                
                const emailValue = emailInput.value.trim();
                const passwordValue = passwordInput.value;

                if (emailValue === "") {
                    emailError.textContent = "Please enter your email!";
                    emailError.classList.add("show");
                    return;
                }

                if (!validateEmail(emailValue)) {
                    emailError.textContent = "Please enter a valid email address!";
                    emailError.classList.add("show");
                    return;
                }

                if (passwordValue === "") {
                    passwordError.textContent = "Please enter your password!";
                    passwordError.classList.add("show");
                    return;
                }

                if (!validatePassword(passwordValue)) {
                    passwordError.textContent = "Password must be at least 6 characters!";
                    passwordError.classList.add("show");
                    return;
                }

                showLoading(true);
                try {
                    await createUserWithEmailAndPassword(auth, emailValue, passwordValue);
                    emailInput.value = "";
                    passwordInput.value = "";
                    clearErrors();
                } catch (error) {
                    if (error.code === "auth/email-already-in-use") {
                        emailError.textContent = "Email already in use!";
                        emailError.classList.add("show");
                    } else {
                        emailError.textContent = error.message;
                        emailError.classList.add("show");
                    }
                } finally {
                    showLoading(false);
                }
            };

            // تسجيل الدخول
            const handleLogin = async () => {
                clearErrors();
                
                const emailValue = emailInput.value.trim();
                const passwordValue = passwordInput.value;

                if (emailValue === "") {
                    emailError.textContent = "Please enter your email!";
                    emailError.classList.add("show");
                    return;
                }

                if (passwordValue === "") {
                    passwordError.textContent = "Please enter your password!";
                    passwordError.classList.add("show");
                    return;
                }

                showLoading(true);
                try {
                    await signInWithEmailAndPassword(auth, emailValue, passwordValue);
                    emailInput.value = "";
                    passwordInput.value = "";
                } catch (error) {
                    if (error.code === "auth/user-not-found" || error.code === "auth/wrong-password") {
                        emailError.textContent = "Email or password is incorrect!";
                        emailError.classList.add("show");
                    } else {
                        emailError.textContent = error.message;
                        emailError.classList.add("show");
                    }
                } finally {
                    showLoading(false);
                }
            };

            // تحميل الرسائل السابقة
            const loadMessages = async () => {
                try {
                    messagesContainer.innerHTML = "";
                    const messagesRef = collection(db, "messages");
                    const q = query(messagesRef, orderBy("timestamp", "asc"), limit(50));
                    const snapshot = await getDocs(q);

                    snapshot.forEach(doc => {
                        const data = doc.data();
                        displayMessage(data.email, data.text, data.timestamp.toDate(), data.email === currentUser.email);
                    });

                    setTimeout(() => {
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }, 100);
                } catch (error) {
                    console.error("Error loading messages:", error);
                }
            };

            // الاستماع إلى الرسائل الجديدة
            const listenToMessages = () => {
                const messagesRef = collection(db, "messages");
                const q = query(messagesRef, orderBy("timestamp", "asc"));
                
                unsubscribeMessages = onSnapshot(q, (snapshot) => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === "added") {
                            const data = change.doc.data();
                            const isOwnMessage = data.email === currentUser.email;
                            
                            // تجنب العرض المكرر
                            if (!document.querySelector(`[data-msg-id="${change.doc.id}"]`)) {
                                displayMessage(data.email, data.text, data.timestamp.toDate(), isOwnMessage, change.doc.id);
                            }
                        }
                    });
                });
            };

            // عرض الرسالة
            const displayMessage = (email, text, timestamp, isOwnMessage, docId = null) => {
                const username = email.split("@")[0];
                const timeString = timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const firstLetter = username.charAt(0).toUpperCase();
                const avatarBg = getAvatarColor(email);

                const msgWrapper = document.createElement("div");
                msgWrapper.classList.add("message-wrapper");
                if (isOwnMessage) msgWrapper.classList.add("own-message");
                if (docId) msgWrapper.setAttribute("data-msg-id", docId);

                const avatar = document.createElement("div");
                avatar.className = "avatar";
                avatar.style.backgroundColor = avatarBg;
                avatar.textContent = firstLetter;

                const messageContent = document.createElement("div");
                messageContent.className = "message-content";

                const msgHeader = document.createElement("div");
                msgHeader.className = "msg-header";

                const msgUsername = document.createElement("span");
                msgUsername.className = "msg-username";
                msgUsername.textContent = username;

                const msgTime = document.createElement("span");
                msgTime.className = "msg-time";
                msgTime.textContent = timeString;

                msgHeader.appendChild(msgUsername);
                msgHeader.appendChild(msgTime);

                const msgText = document.createElement("div");
                msgText.className = "msg-text";
                msgText.textContent = text;

                messageContent.appendChild(msgHeader);
                messageContent.appendChild(msgText);

                msgWrapper.appendChild(avatar);
                msgWrapper.appendChild(messageContent);

                messagesContainer.appendChild(msgWrapper);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            };

            // إرسال الرسالة
            const sendMessage = async () => {
                const text = messageInput.value.trim();
                
                if (text === "" || !text.replace(/\s/g, '').length) return;

                try {
                    const messagesRef = collection(db, "messages");
                    await addDoc(messagesRef, {
                        email: currentUser.email,
                        text: text,
                        timestamp: new Date()
                    });

                    messageInput.value = "";
                    messageInput.focus();
                } catch (error) {
                    console.error("Error sending message:", error);
                    alert("Failed to send message!");
                }
            };

            // مراقبة حالة المستخدم
            onAuthStateChanged(auth, user => {
                checkAuthStatus(user);
            });

            // Event Listeners
            loginBtn.addEventListener("click", handleLogin);
            registerBtn.addEventListener("click", handleRegister);

            emailInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") handleLogin();
            });

            passwordInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") handleLogin();
            });

            sendBtn.addEventListener("click", sendMessage);
            messageInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") sendMessage();
            });

            logoutBtn.addEventListener("click", async () => {
                await signOut(auth);
                messagesContainer.innerHTML = "";
            });
        });
    </script>
</body>
</html>
