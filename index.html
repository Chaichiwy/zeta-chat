<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZETA Chat</title>
    <style>
        /* --- قسم الـ CSS الكامل والمطور --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        input {
            padding: 14px;
            border: 2px solid transparent;
            outline: none;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #3b82f6;
            background: #1e293b;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* واجهة تسجيل الدخول */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: #1e293b;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .login-card h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* واجهة المحادثة */
        .chat-app {
            display: none;
            flex-direction: row;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #1e293b;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid #334155;
        }

        .sidebar h2 {
            font-size: 24px;
            font-weight: 800;
            color: #3b82f6;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        /* صندوق الرسائل المطور */
        #messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* تصميم كرت الرسالة الجديد */
        .message-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            max-width: 80%;
        }

        /* الصورة الرمزية للمستخدم (Avatar) */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #475569;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            text-transform: uppercase;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .message-content {
            background: #1e293b;
            padding: 12px 16px;
            border-radius: 0 16px 16px 16px;
            position: relative;
            max-width: 100%;
            word-wrap: break-word;
        }

        /* لتمييز رسائلك أنت عن الآخرين مستقبلاً */
        .message-wrapper.own-message {
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 80%;
        }

        .message-wrapper.own-message .message-content {
            background: #2563eb;
            border-radius: 16px 0 16px 16px;
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .msg-username {
            font-weight: 700;
            font-size: 14px;
            color: #60a5fa;
        }
        
        .message-wrapper.own-message .msg-username {
            color: #93c5fd;
        }

        .msg-time {
            font-size: 11px;
            color: #94a3b8;
        }

        .message-wrapper.own-message .msg-time {
            color: #bfdbfe;
        }

        .msg-text {
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
            white-space: pre-wrap;
        }

        /* صندوق الإرسال */
        .send-box {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: #0f172a;
            border-top: 1px solid #1e293b;
        }

        #messageInput {
            flex: 1;
            background: #1e293b;
        }

        #logoutBtn {
            background: #ef4444;
            width: 100%;
        }

        #logoutBtn:hover {
            background: #dc2626;
        }

        /* 📱 شاشات الهواتف الذكية (Responsive Design) */
        @media (max-width: 768px) {
            .chat-app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                padding: 15px 20px;
                flex-direction: row;
                align-items: center;
                border-right: none;
                border-bottom: 1px solid #334155;
            }
            #logoutBtn {
                width: auto;
                padding: 8px 16px;
            }
            #welcomeUser {
                margin-top: 0 !important;
                display: inline-block;
                margin-left: 10px;
            }
            .message-wrapper {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <div id="loginPage" class="login-container">
        <div class="login-card">
            <h1>ZETA Chat</h1>
            <p style="color: #94a3b8; font-size: 15px;">Real Time Chat Application</p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn">Login</button>
            <button id="registerBtn" style="background: #334155;">Create Account</button>
        </div>
    </div>

    <div id="chatPage" class="chat-app">
        <aside class="sidebar">
            <div>
                <h2>ZETA</h2>
                <p id="welcomeUser" style="color: #94a3b8; margin-top: 8px; font-size: 14px;"></p>
            </div>
            <button id="logoutBtn">Logout</button>
        </aside>

        <main class="chat-area">
            <div id="messages"></div>
            <div class="send-box">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button id="sendBtn">Send</button>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginPage = document.getElementById("loginPage");
            const loginBtn = document.getElementById("loginBtn");
            const registerBtn = document.getElementById("registerBtn");
            const emailInput = document.getElementById("email");

            const chatPage = document.getElementById("chatPage");
            const messageInput = document.getElementById("messageInput");
            const sendBtn = document.getElementById("sendBtn");
            const messagesContainer = document.getElementById("messages");
            const logoutBtn = document.getElementById("logoutBtn");
            const welcomeUser = document.getElementById("welcomeUser");

            // دالة لتوليد لون خلفية عشوائي وثابت لكل مستخدم بناءً على اسمه لـ Avatar
            const getAvatarColor = (username) => {
                let hash = 0;
                for (let i = 0; i < username.length; i++) {
                    hash = username.charCodeAt(i) + ((hash << 5) - hash);
                }
                const colors = ['#2563eb', '#16a34a', '#db2777', '#d97706', '#9333ea', '#ea580c', '#0d9488'];
                return colors[Math.abs(hash) % colors.length];
            };

            // دالة لتنظيف وحماية النصوص من XSS
            const escapeHTML = (text) => {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            };

            const checkAuthStatus = () => {
                const savedUser = localStorage.getItem("zeta_username");
                if (savedUser) {
                    loginPage.style.display = "none";
                    chatPage.style.display = "flex";
                    welcomeUser.textContent = `👤 ${savedUser}`;
                } else {
                    loginPage.style.display = "flex";
                    chatPage.style.display = "none";
                }
            };

            const handleAuth = () => {
                const emailValue = emailInput.value.trim();
                if (emailValue === "") {
                    alert("Please enter your email!");
                    return;
                }
                const username = emailValue.split("@")[0];
                localStorage.setItem("zeta_username", username);
                checkAuthStatus();
            };

            // دالة إرسال الرسائل مع توليد الـ Avatar والـ Time
            const sendMessage = () => {
                const text = messageInput.value.trim();
                if (text === "") return;

                const username = localStorage.getItem("zeta_username") || "User";
                
                // جلب الوقت الحالي بتنسيق (ساعة:دقيقة)
                const now = new Date();
                const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                // الحرف الأول للـ Avatar
                const firstLetter = username.charAt(0).toUpperCase();
                const avatarBg = getAvatarColor(username);

                // بناء هيكل الرسالة الجديد والمطور
                const msgWrapper = document.createElement("div");
                msgWrapper.classList.add("message-wrapper", "own-message");

                // إنشء العناصر بشكل آمن بدلاً من innerHTML
                const avatar = document.createElement("div");
                avatar.className = "avatar";
                avatar.style.backgroundColor = avatarBg;
                avatar.textContent = firstLetter;

                const messageContent = document.createElement("div");
                messageContent.className = "message-content";

                const msgHeader = document.createElement("div");
                msgHeader.className = "msg-header";

                const msgUsername = document.createElement("span");
                msgUsername.className = "msg-username";
                msgUsername.textContent = username;

                const msgTime = document.createElement("span");
                msgTime.className = "msg-time";
                msgTime.textContent = timeString;

                msgHeader.appendChild(msgUsername);
                msgHeader.appendChild(msgTime);

                const msgText = document.createElement("div");
                msgText.className = "msg-text";
                msgText.textContent = text;

                messageContent.appendChild(msgHeader);
                messageContent.appendChild(msgText);

                msgWrapper.appendChild(avatar);
                msgWrapper.appendChild(messageContent);

                messagesContainer.appendChild(msgWrapper);
                messageInput.value = "";
                messageInput.focus();

                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            };

            if (loginBtn) loginBtn.addEventListener("click", handleAuth);
            if (registerBtn) registerBtn.addEventListener("click", handleAuth);

            sendBtn.addEventListener("click", sendMessage);
            messageInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") sendMessage();
            });

            logoutBtn.addEventListener("click", () => {
                localStorage.removeItem("zeta_username");
                checkAuthStatus();
                messagesContainer.innerHTML = "";
            });

            checkAuthStatus();
        });
    </script>
</body>
</html>
